<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f4f6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0L0 0 0 48" fill="none" stroke="#0a0a0a" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(80, 80)">
    <rect width="52" height="52" rx="14" fill="url(#logo)"/>
    <rect x="6" y="6" width="40" height="40" rx="10" fill="#ffffff"/>
    <circle cx="26" cy="26" r="10" fill="url(#logo)"/>
    <text x="72" y="35" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="600" fill="#0a0a0a" letter-spacing="-0.02em">Kaleidos Pay</text>
  </g>

  <!-- Pill -->
  <g transform="translate(80, 200)">
    <rect width="270" height="36" rx="18" fill="#ffffff" stroke="#e5e7eb"/>
    <circle cx="20" cy="18" r="4" fill="#10b981"/>
    <text x="32" y="24" font-family="Inter, sans-serif" font-size="13" fill="#6b7280" letter-spacing="0.02em">LISTA DE ESPERA · ABRIL 2026</text>
  </g>

  <!-- Headline -->
  <text x="80" y="332" font-family="Inter, sans-serif" font-size="96" font-weight="600" fill="#0a0a0a" letter-spacing="-0.04em">Receba sem atrito.</text>

  <!-- Subhead -->
  <text x="80" y="400" font-family="Inter, sans-serif" font-size="28" fill="#6b7280" letter-spacing="-0.01em">
    <tspan>Checkout, PIX, split e recorrência.</tspan>
  </text>
  <text x="80" y="438" font-family="Inter, sans-serif" font-size="28" fill="#6b7280" letter-spacing="-0.01em">
    <tspan>O gateway que entende o Brasil.</tspan>
  </text>

  <!-- Feature chips -->
  <g transform="translate(80, 510)">
    <g>
      <rect width="126" height="44" rx="22" fill="#ffffff" stroke="#e5e7eb"/>
      <circle cx="20" cy="22" r="4" fill="#10b981"/>
      <text x="34" y="28" font-family="Inter, sans-serif" font-size="15" fill="#0a0a0a" font-weight="500">PIX instant</text>
    </g>
    <g transform="translate(140, 0)">
      <rect width="120" height="44" rx="22" fill="#ffffff" stroke="#e5e7eb"/>
      <circle cx="20" cy="22" r="4" fill="#10b981"/>
      <text x="34" y="28" font-family="Inter, sans-serif" font-size="15" fill="#0a0a0a" font-weight="500">Split nativo</text>
    </g>
    <g transform="translate(274, 0)">
      <rect width="112" height="44" rx="22" fill="#ffffff" stroke="#e5e7eb"/>
      <circle cx="20" cy="22" r="4" fill="#10b981"/>
      <text x="34" y="28" font-family="Inter, sans-serif" font-size="15" fill="#0a0a0a" font-weight="500">API first</text>
    </g>
  </g>

  <!-- Decorative dashboard block -->
  <g transform="translate(780, 170)">
    <rect width="340" height="280" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
    <rect x="0" y="0" width="340" height="40" rx="16" fill="#fafafa"/>
    <rect x="0" y="28" width="340" height="12" fill="#fafafa"/>
    <line x1="0" y1="40" x2="340" y2="40" stroke="#e5e7eb"/>
    <circle cx="18" cy="20" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="20" r="5" fill="#febc2e"/>
    <circle cx="54" cy="20" r="5" fill="#28c840"/>

    <text x="24" y="80" font-family="Inter, sans-serif" font-size="13" fill="#6b7280">Recebido hoje</text>
    <text x="24" y="118" font-family="Inter, sans-serif" font-size="34" font-weight="600" fill="#0a0a0a" letter-spacing="-0.02em">R$ 48.920</text>
    <rect x="180" y="96" width="62" height="24" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="192" y="112" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#047857">+22%</text>

    <!-- sparkline -->
    <path d="M24 200 C70 190 100 210 140 195 C180 175 210 190 250 175 C280 165 310 170 316 168" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M24 200 C70 190 100 210 140 195 C180 175 210 190 250 175 C280 165 310 170 316 168 L316 250 L24 250 Z" fill="#10b981" fill-opacity="0.1"/>
  </g>
</svg>
